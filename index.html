<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Briefing</title>
  <style>
    :root {
      --glass-dark: rgba(15, 23, 42, 0.78);
      --glass-strong: rgba(30, 41, 59, 0.88);
      --accent: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(120deg, #ff7a18, #ff512f, #f09819, #ffb347);
      background-size: 300% 300%;
      animation: gradientFlow 22s ease infinite;
    }

    body::before {
      content: "";
      position: absolute;
      width: 140%;
      height: 140%;
      top: -20%;
      left: -20%;
      background: radial-gradient(circle at 30% 30%, rgba(255,200,120,0.15), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(255,120,80,0.15), transparent 60%);
      filter: blur(90px);
      animation: pulseGlow 14s ease-in-out infinite;
      z-index: 0;
    }

    .stage {
      position: absolute;
      z-index: 10;
      text-align: center;
      opacity: 1;
      transition: all 0.6s ease;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: transparent;
    }

    .stage.shifted h1 {
      transform: translateY(-40px);
      opacity: 0.9;
    }

    .stage h1 {
      font-size: 40px;
      margin: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }

    .temp-block {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s ease;
      margin-top: 20px;
    }

    .temp-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .temp-details {
      margin-top: 8px;
      font-size: 18px;
      opacity: 0.85;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.6;
    }

    .container {
      pointer-events: none;
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 440px;
      padding: 26px;
      border-radius: 28px;
      background: var(--glass-dark);
      backdrop-filter: blur(25px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      opacity: 0;
      transform: scale(0.96);
      transition: all 0.5s ease;
    }

    .container.visible { opacity: 1; transform: scale(1); }

    h1 { font-size: 28px; margin-bottom: 6px; }
    .date { opacity: 0.75; margin-bottom: 20px; }

    .weather {
      margin-bottom: 26px;
      padding: 18px;
      border-radius: 18px;
      background: var(--glass-strong);
      display: flex;
      justify-content: space-between;
    }

    .weather-temp { font-size: 34px; font-weight: bold; }
    .weather-icon { width: 60px; height: 60px; }

    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .todo-item.completed { opacity: 0.6; transform: scale(0.98); }

    .todo-item input {
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--accent);
      margin-right: 14px;
      position: relative;
    }

    .todo-item input:checked { background: var(--accent); }

    .todo-item input:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 6px;
      height: 12px;
      border: solid #111;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .actions { display: flex; gap: 10px; margin-top: 20px; }

    .action-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      gap: 6px;
    }

    .action-btn img {
      width: clamp(22px, 6vw, 32px);
      height: clamp(22px, 6vw, 32px);
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .quote { margin-top: 22px; font-style: italic; opacity: 0.85; font-size: 14px; }
  </style>
</head>
<body>

  <div id="stage" class="stage">
    <h1 id="splash-greeting">Good morning</h1>

    <div id="temp-block" class="temp-block">
      <h1 id="temp-main">--°C</h1>
      <div class="temp-details" id="temp-range"></div>
      <div class="temp-details" id="temp-summary"></div>
      <div class="hint">Tap anywhere to continue</div>
    </div>
  </div>

  <div id="main" class="container hidden">
    <h1 id="greeting">Good morning</h1>
    <div class="date" id="date"></div>

    <div class="weather">
      <div>
        <div>London</div>
        <div class="weather-temp" id="temp">--°C</div>
        <div id="weather-desc"></div>
      </div>
      <img id="weather-icon" class="weather-icon" src="icons/sun.png">
    </div>

    <div class="todo">
      <label class="todo-item"><input type="checkbox"><span>Review priorities</span></label>
      <label class="todo-item"><input type="checkbox"><span>30 min focused work</span></label>
      <label class="todo-item"><input type="checkbox"><span>Quick exercise</span></label>
    </div>

    <div class="actions">
      <a class="action-btn" href="https://www.youtube.com"><img src="icons/youtube.png">YouTube</a>
      <a class="action-btn" href="https://www.thetimes.co.uk"><img src="icons/times.png">The Times</a>
      <a class="action-btn" href="https://www.metoffice.gov.uk"><img src="icons/met.png">Met Office</a>
    </div>

    <div class="quote" id="quote"></div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const tempBlock = document.getElementById('temp-block');

    // Initial auto sequence
    setTimeout(() => {
      stage.classList.add('shifted');
      tempBlock.classList.add('visible');
    }, 1500);

    // Tap to continue
    stage.addEventListener('click', () => {
      stage.style.opacity = 0;
      setTimeout(() => {
        stage.style.display = 'none';
        const main = document.getElementById('main');
        main.classList.remove('hidden');
        main.style.pointerEvents = 'auto';
        setTimeout(() => main.classList.add('visible'), 10);
      }, 400);
    });

    const hour = new Date().getHours();
    const greetingText = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = greetingText;
    document.getElementById('splash-greeting').textContent = greetingText;

    document.getElementById('date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long' });

    fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto')
      .then(res => res.json())
      .then(data => {
        const temp = data.current_weather.temperature;
        const max = data.daily.temperature_2m_max[0];
        const min = data.daily.temperature_2m_min[0];

        document.getElementById('temp').textContent = temp + '°C';
        document.getElementById('temp-main').textContent = temp + '°C';
        document.getElementById('temp-range').textContent = `High ${max}° • Low ${min}°`;

        let summary;
        const range = max - min;

        if (temp < 10 && max < 15) summary = 'A properly cool day — crisp and consistent.';
        else if (temp < 10 && max >= 18) summary = 'Cool start, but warming up later.';
        else if (temp >= 18 && max < 22) summary = 'Mild and steady — comfortable throughout.';
        else if (temp >= 20 && range > 8) summary = 'Warm day with a noticeable temperature swing.';
        else if (max >= 25 && temp >= 18) summary = 'A warmer day ahead — likely to build heat.';
        else if (max >= 25) summary = 'Hot later, even if it feels manageable now.';
        else summary = 'A balanced day temperature-wise.';

        document.getElementById('temp-summary').textContent = summary;
      });

    fetch('verses.json')
      .then(res => res.json())
      .then(data => {
        const verse = data[Math.floor(Math.random() * data.length)];
        document.getElementById('quote').textContent = verse;
      });

    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach((box, i) => {
      const saved = localStorage.getItem('todo-' + i);
      box.checked = saved === 'true';
      const parent = box.closest('.todo-item');
      if (box.checked) parent.classList.add('completed');

      box.addEventListener('change', () => {
        localStorage.setItem('todo-' + i, box.checked);
        parent.classList.toggle('completed');
        parent.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.05)' }, { transform: 'scale(0.98)' }], { duration: 250 });
      });
    });
  </script>
</body>
</html>
