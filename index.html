<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Briefing</title>
  <style>
    :root {
      --glass-dark: rgba(15, 23, 42, 0.78);
      --glass-strong: rgba(30, 41, 59, 0.88);
      --accent: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(120deg, #ff7a18, #ff512f, #f09819, #ffb347);
      background-size: 300% 300%;
      animation: gradientFlow 22s ease infinite;
    }

    body::before {
      content: "";
      position: absolute;
      width: 140%;
      height: 140%;
      top: -20%;
      left: -20%;
      background: radial-gradient(circle at 30% 30%, rgba(255,200,120,0.15), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(255,120,80,0.15), transparent 60%);
      filter: blur(90px);
      animation: pulseGlow 14s ease-in-out infinite;
      z-index: 0;
    }

    .stage {
      position: absolute;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .stage.shifted h1 {
      transform: translateY(-40px);
      opacity: 0.9;
    }

    .stage h1 {
      font-size: 40px;
      margin: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }

    .temp-block {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s ease;
      margin-top: 20px;
    }

    .temp-block.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .temp-wrapper {
      padding: 26px;
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .temp-scale {
      position: relative;
      height: 30px;
      margin-bottom: 22px;
    }

    .scale-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(to right, #3b82f6, #38bdf8, #f59e0b, #ef4444);
      transform: translateY(-50%);
    }

    .scale-point {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: all 0.4s ease;
    }

    .scale-point.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .scale-label {
      position: absolute;
      top: 100%;
      font-size: 11px;
      opacity: 0.7;
      transform: translateX(-50%);
    }

    #label-min { left: 0%; }
    #label-mid { left: 50%; }
    #label-max { left: 100%; }

    .temp-cards {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .temp-card {
      flex: 1;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .temp-card .label {
      font-size: 11px;
      opacity: 0.65;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .temp-card .value {
      font-size: 20px;
      font-weight: 600;
    }

    .temp-card.now {
      transform: scale(1.08);
      background: rgba(255,255,255,0.12);
    }

    .temp-card.now .value {
      font-size: 26px;
      font-weight: 700;
    }

    .temp-details { margin-top: 10px; font-size: 14px; }

    .temp-error { margin-top: 8px; font-size: 13px; color: #fca5a5; }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .container {
      pointer-events: none;
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 440px;
      padding: 26px;
      border-radius: 28px;
      background: var(--glass-dark);
      backdrop-filter: blur(25px);
      opacity: 0;
      transform: scale(0.96);
      transition: all 0.5s ease;
    }

    .container.visible { opacity: 1; transform: scale(1); }

    .date { opacity: 0.75; margin-bottom: 20px; }

    .weather {
      margin-bottom: 26px;
      padding: 18px;
      border-radius: 18px;
      background: var(--glass-strong);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weather-temp { font-size: 30px; font-weight: bold; }
    .weather-icon { width: 50px; height: 50px; }

    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .todo-item input { margin-right: 10px; }

    .actions { display: flex; gap: 10px; margin-top: 18px; }

    .action-btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      gap: 6px;
    }

    .action-btn img {
      width: clamp(22px, 6vw, 32px);
      height: clamp(22px, 6vw, 32px);
      object-fit: contain;
    }

    .quote { margin-top: 18px; font-style: italic; opacity: 0.85; font-size: 14px; }

    .weather,
    .todo-item,
    .actions,
    .quote {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.6s ease forwards;
    }

    .weather { animation-delay: 0.1s; }
    .todo-item:nth-child(1) { animation-delay: 0.2s; }
    .todo-item:nth-child(2) { animation-delay: 0.3s; }
    .todo-item:nth-child(3) { animation-delay: 0.4s; }
    .actions { animation-delay: 0.5s; }
    .quote { animation-delay: 0.6s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div id="stage" class="stage">
    <h1 id="splash-greeting">Good morning</h1>

    <div id="temp-block" class="temp-block">
      <div class="temp-wrapper">
        <div class="temp-scale">
          <div class="scale-line"></div>
          <div class="scale-point" id="point-low"></div>
          <div class="scale-point" id="point-current"></div>
          <div class="scale-point" id="point-high"></div>

          <div class="scale-label" id="label-min"></div>
          <div class="scale-label" id="label-mid"></div>
          <div class="scale-label" id="label-max"></div>
        </div>

        <div class="temp-cards">
          <div class="temp-card">
            <div class="label">Low</div>
            <div class="value" id="temp-low">--°</div>
          </div>
          <div class="temp-card now">
            <div class="label">Now</div>
            <div class="value" id="temp-main">--°</div>
          </div>
          <div class="temp-card">
            <div class="label">High</div>
            <div class="value" id="temp-high">--°</div>
          </div>
        </div>

        <div class="temp-details" id="temp-summary"></div>
        <div class="temp-error" id="temp-error"></div>
      </div>
      <div class="hint">Tap anywhere to continue</div>
    </div>
  </div>

  <div id="main" class="container">
    <h1 id="greeting">Good morning</h1>
    <div class="date" id="date"></div>

    <div class="weather">
      <div>
        <div>London</div>
        <div class="weather-temp" id="temp">--°C</div>
        <div id="weather-desc"></div>
      </div>
      <img id="weather-icon" class="weather-icon" src="icons/sun.png">
    </div>

    <div class="todo">
      <label class="todo-item"><input type="checkbox"><span>Review priorities</span></label>
      <label class="todo-item"><input type="checkbox"><span>30 min focused work</span></label>
      <label class="todo-item"><input type="checkbox"><span>Quick exercise</span></label>
    </div>

    <div class="actions">
      <a class="action-btn" href="https://www.youtube.com"><img src="icons/youtube.png">YouTube</a>
      <a class="action-btn" href="https://www.thetimes.co.uk"><img src="icons/times.png">The Times</a>
      <a class="action-btn" href="https://www.metoffice.gov.uk"><img src="icons/met.png">Met Office</a>
    </div>

    <div class="quote" id="quote"></div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const tempBlock = document.getElementById('temp-block');

    setTimeout(() => {
      stage.classList.add('shifted');
      tempBlock.classList.add('visible');

      setTimeout(() => {
        document.querySelector('.hint').style.opacity = 1;
      }, 700);
    }, 1500);

    stage.addEventListener('click', () => {
      stage.style.opacity = 0;
      setTimeout(() => {
        stage.style.display = 'none';
        const main = document.getElementById('main');
        main.classList.add('visible');
        main.style.pointerEvents = 'auto';
      }, 400);
    });

    fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto')
      .then(res => res.json())
      .then(data => {
        const temp = data.current_weather.temperature;
        const max = data.daily.temperature_2m_max[0];
        const min = data.daily.temperature_2m_min[0];

        document.getElementById('temp-main').textContent = temp + '°';
        document.getElementById('temp-high').textContent = max + '°';
        document.getElementById('temp-low').textContent = min + '°';

        const padding = 4;
        const minVal = Math.min(min, temp, max) - padding;
        const maxVal = Math.max(min, temp, max) + padding;
        const midVal = Math.round((minVal + maxVal) / 2);

        document.getElementById('label-min').textContent = Math.round(minVal) + '°';
        document.getElementById('label-mid').textContent = midVal + '°';
        document.getElementById('label-max').textContent = Math.round(maxVal) + '°';

        const position = (t) => ((t - minVal) / (maxVal - minVal)) * 100;

        const setPoint = (id, value, delay) => {
          const el = document.getElementById(id);
          el.style.left = position(value) + '%';
          setTimeout(() => el.classList.add('visible'), delay);
        };

        setPoint('point-low', min, 0);
        setPoint('point-current', temp, 120);
        setPoint('point-high', max, 240);

        let summary;
        const range = max - min;

        if (temp < 10 && max < 15) {
          summary = 'A properly cool day — crisp and consistent.';
        } else if (temp < 10 && max >= 18) {
          summary = 'Cool to start, but warming noticeably later.';
        } else if (temp >= 18 && max < 22) {
          summary = 'Mild and steady — comfortable throughout.';
        } else if (temp >= 20 && range > 8) {
          summary = 'A warmer day with a noticeable temperature swing.';
        } else if (max >= 25 && temp >= 18) {
          summary = 'A warm day ahead — likely to build heat.';
        } else if (max >= 25) {
          summary = 'Hot later, even if it feels manageable now.';
        } else {
          summary = 'A balanced day temperature-wise.';
        }

        document.getElementById('temp-summary').textContent = summary;
      })
      .catch(() => {
        document.getElementById('temp-error').textContent = 'Weather data unavailable — check connection.';
      });

    fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current_weather=true&timezone=auto')
      .then(res => res.json())
      .then(data => {
        const weather = data.current_weather;

        document.getElementById('temp').textContent =
          Math.round(weather.temperature) + '°C';

        const code = weather.weathercode;

        const weatherMap = {
          0: ['Clear', 'sun.png'],
          1: ['Mostly clear', 'cloud-sun.png'],
          2: ['Partly cloudy', 'cloud.png'],
          3: ['Cloudy', 'cloud.png'],
          61: ['Rain', 'rain.png'],
          63: ['Heavy rain', 'rain.png'],
          71: ['Snow', 'snow.png'],
          95: ['Storms', 'storm.png']
        };

        const [desc, icon] = weatherMap[code] || ['Unknown', 'cloud.png'];

        document.getElementById('weather-desc').textContent = desc;
        document.getElementById('weather-icon').src = 'icons/' + icon;
      });
      // Populate dashboard
    const hour = new Date().getHours();
    const greetingText = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = greetingText;
    document.getElementById('splash-greeting').textContent = greetingText;

    document.getElementById('date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long' });

    fetch('verses.json')
      .then(res => res.json())
      .then(data => {
        const verse = data[Math.floor(Math.random() * data.length)];
        document.getElementById('quote').textContent = verse;
      });

    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach((box, i) => {
      const saved = localStorage.getItem('todo-' + i);
      box.checked = saved === 'true';
      box.addEventListener('change', () => {
        localStorage.setItem('todo-' + i, box.checked);
      });
    });

  </script>
</body>
</html>
